<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>给老婆做的小游戏2.0</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <div class="game-title">
                <div class="title-main">小马逻辑</div>
                <div class="title-sub">逻辑推理</div>
                <div class="title-decoration">
                    <span class="deco-star">⭐</span>
                    <span class="deco-star">🌟</span>
                    <span class="deco-star">⭐</span>
                </div>
            </div>

            <div class="resource-bar">
                <div class="resource-item">
                    <span class="resource-icon">🐴</span>
                    <span class="resource-value" id="totalStars">0</span>
                </div>
            </div>

            <button class="start-btn" onclick="startGame()">开始游戏</button>

            <div class="mode-section">
                <div class="mode-title">选择模式</div>
                <div class="mode-btns">
                    <button class="mode-btn active" data-mode="classic">经典模式</button>
                    <button class="mode-btn locked" data-mode="challenge">挑战模式</button>
                    <button class="mode-btn locked" data-mode="battle">对战模式</button>
                </div>
            </div>

            <div class="level-section">
                <div class="level-title">
                    <span>🎯</span>
                    <span>选择关卡</span>
                </div>
                <div class="level-grid" id="levelGrid"></div>
            </div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="header">
                <div class="top-row">
                    <button class="back-btn" onclick="showStartScreen()">←</button>
                    <div class="level-badge">第 <span id="levelNum">1</span> 关</div>
                    <div class="lives" id="lives">
                        <span class="heart">❤️</span>
                        <span class="heart">❤️</span>
                    </div>
                </div>
                <div class="progress-row">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress" style="width: 0%"></div>
                    </div>
                    <div class="win-streak">
                        <span>💖</span>
                        <span id="affection">0</span>
                    </div>
                </div>
            </div>

            <div class="rules-section">
                <div class="rule-card">
                    <div class="rule-icon">🎨</div>
                    <div>每色1匹</div>
                </div>
                <div class="rule-card">
                    <div class="rule-icon">📐</div>
                    <div>每行1匹</div>
                </div>
                <div class="rule-card">
                    <div class="rule-icon">📐</div>
                    <div>每列1匹</div>
                </div>
                <div class="rule-card">
                    <div class="rule-icon">🚫</div>
                    <div>不相邻</div>
                </div>
            </div>

            <div class="game-area">
                <div class="remaining-count">
                    还需找到: <span id="toPlace">6</span> 匹小马
                </div>
                <div style="text-align: center; font-size: 12px; color: #888; margin-bottom: 8px;">
                    单击画✕ | 双击找马
                </div>
                <div class="grid-container" id="grid"></div>
            </div>

            <div class="bottom-actions">
                <div class="action-row">
                    <button class="action-btn undo-btn" onclick="undo()">
                        <span class="icon">↩️</span>
                        <span>撤销</span>
                    </button>
                    <button class="action-btn restart-btn" onclick="restartLevel()">
                        <span class="icon">🔄</span>
                        <span>重开</span>
                    </button>
                    <button class="action-btn hint-btn" onclick="useHint()">
                        <span class="icon">💡</span>
                        <span class="count" id="hintCount">9999</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <div class="modal-icon">🎉</div>
            <h2>获得胜利!</h2>
            <div class="modal-stats">
                <div class="stat-item">
                    <div class="stat-value" id="modalWinStreak">0</div>
                    <div class="stat-label">当前连胜</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="modalBestStreak">0</div>
                    <div class="stat-label">最高连胜</div>
                </div>
            </div>
            <div class="modal-progress">
                <div class="modal-progress-fill" id="modalProgress" style="width: 0%"></div>
            </div>
            <p id="winMessage">太棒了！</p>
            <div class="modal-btns">
                <button class="modal-btn secondary" onclick="showStartScreen()">返回</button>
                <button class="modal-btn" onclick="nextLevel()">下一关</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loseModal">
        <div class="modal lose-modal">
            <div class="modal-icon">😢</div>
            <h2>生命耗尽</h2>
            <p>别灰心，再试一次!</p>
            <div class="modal-btns">
                <button class="modal-btn secondary" onclick="showStartScreen()">返回</button>
                <button class="modal-btn" onclick="restartLevel()">重试</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay settings-modal" id="settingsModal">
        <div class="modal">
            <h2>⚙️ 设置</h2>
            <div class="setting-item">
                <span>音效</span>
                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="setting-item">
                <span>震动</span>
                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="setting-item">
                <span>重置进度</span>
                <button class="modal-btn" style="padding: 8px 16px; font-size: 14px;" onclick="resetProgress()">重置</button>
            </div>
            <button class="modal-btn" style="margin-top: 16px;" onclick="closeSettings()">关闭</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
